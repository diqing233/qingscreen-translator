name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pyinstaller>=6.0
          pip install -r requirements.txt

      - name: Generate icons
        run: |
          pip install Pillow
          python build/generate_icons.py

      - name: Build with PyInstaller
        run: |
          pyinstaller build/screen_translator.spec --noconfirm

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create ZIP
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path "dist\ScreenTranslator\*" `
            -DestinationPath "dist\ScreenTranslator-windows-$version.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/ScreenTranslator-windows-*.zip
          retention-days: 7

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pyinstaller>=6.0
          pip install -r requirements.txt

      - name: Generate icons
        run: |
          pip install Pillow
          python build/generate_icons.py

      - name: Build with PyInstaller
        run: |
          pyinstaller build/screen_translator.spec --noconfirm

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="dist/ScreenTranslator.app"
          DMG_PATH="dist/ScreenTranslator-macos-${VERSION}.dmg"
          if [ -d "$APP_PATH" ]; then
            TMP_DIR=$(mktemp -d)
            cp -R "$APP_PATH" "$TMP_DIR/"
            hdiutil create -volname "ScreenTranslator" \
              -srcfolder "$TMP_DIR" \
              -ov -format UDZO \
              "$DMG_PATH"
            rm -rf "$TMP_DIR"
          else
            zip -r "dist/ScreenTranslator-macos-${VERSION}.zip" dist/ScreenTranslator
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/ScreenTranslator-macos-*.dmg
            dist/ScreenTranslator-macos-*.zip
          retention-days: 7

  release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ScreenTranslator ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/**
